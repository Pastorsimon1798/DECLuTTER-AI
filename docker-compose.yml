version: '3.8'

services:
  # PostgreSQL with PostGIS extension
  db:
    image: postgis/postgis:16-3.4
    container_name: communitycircle-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: communitycircle
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - communitycircle-network

  # Redis for Celery and caching
  redis:
    image: redis:7-alpine
    container_name: communitycircle-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - communitycircle-network

  # Backend API (optional - for production-like setup)
  # Uncomment when ready to containerize the backend
  # api:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: communitycircle-api
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://postgres:devpass@db:5432/communitycircle
  #     REDIS_URL: redis://redis:6379/0
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #   networks:
  #     - communitycircle-network

  # Celery worker for background tasks (optional - add later)
  # celery:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: communitycircle-celery
  #   command: celery -A app.tasks.celery_app worker -l info
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://postgres:devpass@db:5432/communitycircle
  #     REDIS_URL: redis://redis:6379/0
  #   depends_on:
  #     - db
  #     - redis
  #   volumes:
  #     - ./backend:/app
  #   networks:
  #     - communitycircle-network

volumes:
  postgres_data:
  redis_data:

networks:
  communitycircle-network:
    driver: bridge
