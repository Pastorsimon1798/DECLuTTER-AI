name: Mutual Aid CI

on:
  pull_request:
    paths:
      - 'modules/mutual-aid/**'
      - '.github/workflows/mutual-aid-ci.yml'
  push:
    branches: [main]
    paths:
      - 'modules/mutual-aid/**'
      - '.github/workflows/mutual-aid-ci.yml'

jobs:
  backend:
    name: Backend compile
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: modules/mutual-aid/backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile backend
        run: python -m compileall -q app alembic

  frontend:
    name: Frontend build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: modules/mutual-aid/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: modules/mutual-aid/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
      - name: Build frontend
        run: npm run build
