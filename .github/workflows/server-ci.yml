name: Server CI

on:
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'server/pyproject.toml'
      - name: Install hatch
        run: python -m pip install --upgrade pip hatch
      - name: Install backend
        run: hatch env create dev
      - name: Run tests
        run: hatch run test
      - name: Compile app and tests
        run: python -m compileall -q app tests
