name: declutter_ai
description: ADHD-friendly decluttering assistant MVP prototype.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.5+5
  permission_handler: ^11.1.0
  image: ^4.1.3
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  onnxruntime: ^1.4.1
  share_plus: ^10.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.4.0+3
  # build_runner: ^2.4.8
  # drift_dev: ^2.30.0

flutter:
  uses-material-design: true
  assets:
    - assets/model/
    - assets/prompts/
