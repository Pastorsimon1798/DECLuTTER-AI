name: declutter_ai
description: ADHD-friendly decluttering assistant MVP prototype.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.5+5
  permission_handler: ^11.1.0
  image: ^4.1.3
  tflite_flutter: ^0.12.1
  shared_preferences: ^2.2.2
  # Drift dependencies — uncomment when build_runner generates app_database.g.dart
  # drift: ^2.30.0
  # drift_flutter: ^0.3.0
  # sqlite3_flutter_libs: ^0.6.0
  # Migration path: ONNX Runtime is the default inference backend.
  # TFLite is retained as a fallback during the transition period and may be
  # removed in a future release once ONNX coverage is verified on all targets.
  onnxruntime: ^1.4.1
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # build_runner: ^2.4.8
  # drift_dev: ^2.30.0

flutter:
  uses-material-design: true
  assets:
    - assets/model/
    - assets/prompts/
